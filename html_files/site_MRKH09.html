
<!DOCTYPE html>
<html>
<head>
  <title>Google Style Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }

    #map {
      height: 100vh;
      width: 100%;
      touch-action: pan-x pan-y; /* ✅ smooth mobile drag */
    }

    /* 🏷️ TOOLTIP (WHITE TEXT FIX) */
    .leaflet-tooltip {
      background: rgba(0,0,0,0.75);
      border: none;
      box-shadow: none;
      color: white;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    /* 💬 POPUP FIX (RESPONSIVE + WHITE TEXT) */
    .leaflet-popup-content-wrapper {
      background: #1e1e1e;
      color: white;
      border-radius: 10px;
      max-width: 85vw;   /* ✅ mobile fit */
    }

    .leaflet-popup-content {
      color: white;
      word-wrap: break-word;
      white-space: normal;
      max-width: 80vw;
    }

    .leaflet-popup-tip {
      background: #1e1e1e;
    }

  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // 🧭 SMOOTH MAP (drag fix)
  var map = L.map('map', {
    inertia: true,
    zoomAnimation: true,
    fadeAnimation: true,
    preferCanvas: true
  }).setView([25.08, 85.4], 14);

  // 🗺 GOOGLE MAP STYLE TILE
  L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
  }).addTo(map);

  // 🔴 RED CIRCLE (unchanged)
  L.circle([25.08, 85.4], {
    color: 'red',
    fillColor: '#ff0000',
    fillOpacity: 0.3,
    radius: 1500
  }).addTo(map);

  // 📍 MARKERS
  
    var marker = L.marker([25.08, 85.4]).addTo(map);

    marker.bindPopup(`
      <b>Silao</b><br><br>
      SNo: 9<br>
      Site: MRKH09<br>
      WIFI: 0<br>
      Gross: 60<br>
      CAF: 0<br>
      SSO: 0<br>
      MNP+Fresh: 1<br>
      Distance: 0.00 KM
    `);

    marker.bindTooltip("Silao (W:0 | G:60)", {
      permanent: true,
      direction: "top",
      offset: [0, -10]
    });
  

</script>

</body>
</html>
